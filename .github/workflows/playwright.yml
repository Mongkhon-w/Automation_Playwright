name: QA Automation Pipeline

on:
  push:
    branches: [ main, feat/setup/config ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # รันเทส (continue-on-error เพื่อให้สคริปต์ล่างสุดทำงานต่อได้แม้เทสพัง)
    - name: Run Playwright tests
      run: npx playwright test
      continue-on-error: true 

    # ส่งผลลัพธ์เข้า InfluxDB (ดึงค่าจาก GitHub Secrets)
    - name: Send Report to InfluxDB
      env:
        INFLUX_URL: ${{ secrets.INFLUX_URL }}
        INFLUX_TOKEN: ${{ secrets.INFLUX_TOKEN }}
        INFLUX_ORG: ${{ secrets.INFLUX_ORG }}
        INFLUX_BUCKET: ${{ secrets.INFLUX_BUCKET }}
      run: node scripts/send-to-influx.js

    # อัปโหลด Report ไว้ดูบน GitHub
    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30